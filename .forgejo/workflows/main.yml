name: deploy-oliverbleen.net

on:
  push:
    tags:
      - 'v*'
      
jobs:
  web-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: FTPS Upload
        uses: https://github.com/SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{secrets.SFTP_URL}}
          username: ${{secrets.SFTP_USERNAME}}
          password: ${{secrets.SFTP_PASSWORD}}
          protocol: ftps
          server-dir: /wwwroot/
          exclude: |
            **/.git*
            **/.git*/**
            README.md
            LICENSE
        
